build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    # Izin khusus agar GITHUB_TOKEN bisa push ke ghcr.io
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}   # ← output untuk dipakai job lain

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      # Login ke ghcr.io pakai GITHUB_TOKEN yang sudah otomatis tersedia
      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # username GitHub kamu
          password: ${{ secrets.GITHUB_TOKEN }}  # token otomatis, tidak perlu buat manual

      # Generate tag otomatis berdasarkan branch, commit, dan event
      - name: Extract metadata untuk Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-          # tag: sha-a3f8c2d
            type=ref,event=branch         # tag: main atau develop
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build dan langsung push ke registry
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # pakai GitHub Actions cache
          cache-to: type=gha,mode=max  # hemat waktu build sampai ~70%
