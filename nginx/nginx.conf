events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3000;    # "api" = nama service di docker-compose
  }

  server {
    listen 80;

    location / {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
      proxy_pass http://api/health;
      access_log off;   # jangan log health check, berisik di log
    }
  }
}
