name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/moran2-cyber/cicd-demo

    steps:
      - uses: actions/checkout@v4

      - name: Login ke ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Copy file Compose ke server
        run: |
          scp -i ~/.ssh/deploy_key \
              docker-compose.yml \
              docker-compose.prod.yml \
              ${{ secrets.SERVER_USER }}@${{ secrets.PROD_HOST }}:/app/

      - name: Deploy ke VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.PROD_HOST }} << 'ENDSSH'
            cd /app
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps --force-recreate api
            docker image prune -f
          ENDSSH

      - name: Verifikasi deploy
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.PROD_HOST }}/health)
          if [ "$response" = "200" ]; then
            echo "Deploy berhasil!"
          else
            echo "Deploy gagal! HTTP $response"
            exit 1
          fi
