services:

  nginx:
    ports:
      - "8080:80"
    restart: always

  api:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres:
    restart: always

  redis:
    restart: always

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
