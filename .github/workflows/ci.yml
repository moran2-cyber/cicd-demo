name: CI Pipeline

# Trigger: workflow berjalan setiap ada push atau pull request
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── JOB 1: Test ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest   # runner gratis dari GitHub

    steps:
      # 1. Ambil kode dari repo
      - name: Checkout kode
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'          # cache node_modules, biar lebih cepat

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci             # pakai ci, bukan install (lebih strict & cepat)

      # 4. Jalankan test
      - name: Run tests
        run: npm test

  # ─── JOB 2: Build Docker ───────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test               # ← job ini HANYA jalan kalau job test LULUS

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cicd-demo:${{ github.sha }} .
          echo "Image built: cicd-demo:${{ github.sha }}"

      # github.sha = commit hash unik, contoh: a3f8c2d
      # ini cara tag image biar bisa dilacak per commit
